# Migrated to the reusable workflow in d-morrison/gha (claude.yml).
#
# The reusable workflow carries the agent-mode machinery: the @claude
# acknowledgment, per-PR concurrency, the late-comment polling loop, branch
# setup + push + draft-PR for issue triggers, the prose-response post (with
# in-thread replies on review comments), and the review re-dispatch. This stub
# supplies only ettbc-specific configuration:
#   - install-quarto so Claude can render the package's .qmd vignettes/site.
#   - webfetch-allowlist-url for the shared d-morrison/stats-allowlist.
#   - prompt-addendum: the ettbc pre-commit checklist.
# ettbc has no submodules and does not use renv, so checkout-submodules /
# use-renv stay at their defaults; setup-r-dependencies installs the package's
# system requirements automatically, so no apt-packages are needed.
name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      # actions: write lets the reusable workflow re-dispatch
      # claude-code-review.yml via workflow_dispatch after pushing commits;
      # triggering a workflow dispatch needs Actions write, not just read.
      actions: write
    uses: d-morrison/gha/.github/workflows/claude.yml@v1
    # Pass secrets explicitly rather than `secrets: inherit`: this caller lives
    # in the ucdavis org but the reusable workflow is in the d-morrison account,
    # and cross-owner `inherit` does not reliably forward repo secrets. Explicit
    # passing reads the caller repo's secrets directly. WORKFLOW_TOKEN is
    # optional (pushes fall back to GITHUB_TOKEN); it is passed through if present.
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
    with:
      install-quarto: true
      webfetch-allowlist-url: https://raw.githubusercontent.com/d-morrison/stats-allowlist/main/allowlist.txt
      prompt-addendum: |
        This is the ettbc R package. Before committing, run devtools::load_all()
        (required before linting so object_usage_linter does not report false
        positives), then lintr::lint_package(), spelling::spell_check_package()
        (add new terms to inst/WORDLIST), and devtools::test(); run
        devtools::document() after roxygen2 changes; and add a NEWS.md bullet
        for user-facing changes.
